apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: bcs-bot-keyvault
  namespace: bcs-bot
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "__CLIENT_ID__"
    keyvaultName: "__KEYVAULT_NAME__"
    tenantId: "__TENANT_ID__"
    objects: |
      array:
        - |
          objectName: AZURE-OPENAI-ENDPOINT
          objectType: secret
        - |
          objectName: AZURE-OPENAI-KEY
          objectType: secret
        - |
          objectName: AZURE-OPENAI-DEPLOYMENT-NAME
          objectType: secret
        - |
          objectName: AZURE-OPENAI-API-VERSION
          objectType: secret
        - |
          objectName: AZURE-SPEECH-KEY
          objectType: secret
        - |
          objectName: AZURE-SPEECH-REGION
          objectType: secret
  secretObjects:
    - secretName: bcs-bot-secrets
      type: Opaque
      data:
        - objectName: AZURE-OPENAI-ENDPOINT
          key: AZURE_OPENAI_ENDPOINT
        - objectName: AZURE-OPENAI-KEY
          key: AZURE_OPENAI_KEY
        - objectName: AZURE-OPENAI-DEPLOYMENT-NAME
          key: AZURE_OPENAI_DEPLOYMENT_NAME
        - objectName: AZURE-OPENAI-API-VERSION
          key: AZURE_OPENAI_API_VERSION
        - objectName: AZURE-SPEECH-KEY
          key: AZURE_SPEECH_KEY
        - objectName: AZURE-SPEECH-REGION
          key: AZURE_SPEECH_REGION
