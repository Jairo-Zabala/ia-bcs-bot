<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banco Caja Social - Asesor Virtual</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="header-logo">
                <img src="{{ url_for('static', filename='img/bcs-ico.png') }}" alt="Banco Caja Social">
            </div>
            <div class="header-info">
                <h1>Banco Caja Social</h1>
                <div class="slogan">Más banco. Más amigo.</div>
                <div class="status"><span class="dot"></span> Asesor Virtual en línea</div>
            </div>
            <div class="header-actions">
                <button class="btn-header" id="settingsBtn" title="Ajustes de voz">⚙️</button>
            </div>
        </div>

        <!-- Chat -->
        <div class="chat-area" id="chatArea">
            <div class="message bot">
                ¡Hola! Soy su Amigo Virtual del Banco Caja Social. Estoy aquí para ayudarle con todas sus consultas sobre nuestros productos y servicios. ¿En qué puedo servirle hoy?
            </div>
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Status -->
        <div class="status-bar" id="statusBar"></div>

        <!-- Input -->
        <div class="input-area">
            <button class="btn-mic" id="micBtn" title="Grabar voz">🎤</button>
            <button class="btn-stop" id="stopBtn" title="Detener audio">⏹️</button>
            <input
                type="text"
                id="messageInput"
                placeholder="Escriba su mensaje..."
                autocomplete="off"
            >
            <button class="btn-send" id="sendBtn" title="Enviar">➤</button>
        </div>

        <!-- Voice Controls (hidden by default) -->
        <div class="voice-controls" id="voiceControls">
            <div class="control-group">
                <label for="voiceSelect">Voz</label>
                <select id="voiceSelect">
                    <option value="es-CO-SalomeNeural">Salome (Colombiana)</option>
                    <option value="es-CO-GonzaloNeural">Gonzalo (Colombiano)</option>
                    <option value="es-MX-DaliaNeural">Dalia (Mexicana)</option>
                    <option value="es-ES-ElviraNeural">Elvira (Española)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="rateControl">Velocidad: <span id="rateValue">1.1</span>x</label>
                <input type="range" id="rateControl" min="0.5" max="2" step="0.1" value="1.1">
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            Banco Caja Social · Línea Amiga <a href="tel:#233">#233</a> · <a href="https://www.bancocajasocial.com" target="_blank">www.bancocajasocial.com</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
